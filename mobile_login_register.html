<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Login / Register - Mobile</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 360px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Mobile width */
        .card {
            background: #fff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1);
        }

        .title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: .5rem;
        }

        input {
            width: 100%;
            padding: .5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn {
            display: inline-block;
            padding: .75rem 1.5rem;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 1rem;
        }

        .btn:hover {
            background: #0069d9;
        }

        .text-danger {
            color: #dc3545;
            font-size: .875rem;
        }

        .desc {
            font-size: .875rem;
            color: #555;
        }

        a.lost-password {
            font-size: .875rem;
            color: #007bff;
            text-decoration: none;
            display: block;
            margin-top: 1rem;
        }

        a.lost-password:hover {
            text-decoration: underline;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            margin: -10px;
        }

        .col {
            flex: 1 1 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Full width on mobile */
    </style>
</head>

<body>
    <div class="container">
        <h2>Account</h2>
        <div class="card">
            <h3 class="title">Login</h3>
            <form>
                <div class="form-group">
                    <label for="login_email">Email Address <sup>*</sup></label>
                    <input type="email" id="login_email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="login_pwsd">Password <sup>*</sup></label>
                    <input type="password" id="login_pwsd" name="password" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn">Login</button>
                    <label><input type="checkbox" name="remember"> Remember Me</label>
                </div>
                <a href="#" class="lost-password">Lost your Password?</a>
            </form>
        </div>
        <div class="card">
            <h3 class="title">Register</h3>
            <form>
                <div class="row">
                    <div class="col">
                        <div class="form-group">
                            <label for="register_firstname">First Name <sup>*</sup></label>
                            <input type="text" id="register_firstname" name="first_name" required>
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-group">
                            <label for="register_lastname">Last Name <sup>*</sup></label>
                            <input type="text" id="register_lastname" name="last_name" required>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="register_phone">Phone <sup>*</sup></label>
                    <input type="text" id="register_phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="register_email">Email Address <sup>*</sup></label>
                    <input type="email" id="register_email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="register_pwsd">Password <sup>*</sup></label>
                    <input type="password" id="register_pwsd" name="password" required>
                </div>
                <div class="form-group">
                    <label for="register_pwsd_confirm">Confirm Password <sup>*</sup></label>
                    <input type="password" id="register_pwsd_confirm" name="password_confirmation" required>
                </div>
                <p class="desc">Your personal data will be used to support your experience throughout this website, to
                    manage access to your account, and for other purposes described in our privacy policy.</p>
                <button type="submit" class="btn">Register</button>
            </form>
        </div>
    </div>
</body>

</html>
