<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Header & Footer - Mint Cosmetics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #fff;
            color: #333;
            line-height: 1.6;
        }

        /* Header Styles */
        .header {
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
            padding: 20px 0;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-image {
            width: 50px;
            height: 50px;
        }

        .logo-text {
            font-size: 16px;
            font-weight: 600;
            color: #ff6b9d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-menu {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-menu a {
            text-decoration: none;
            color: #333;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-menu a:hover {
            color: #ff6b9d;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            padding: 5px;
        }

        .icon-btn svg {
            width: 22px;
            height: 22px;
            stroke: #333;
            fill: none;
            stroke-width: 2;
        }

        .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #ff6b6b;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .badge.wishlist {
            background: #ff6b9d;
        }

        /* Main Content Spacer */
        .main-content {
            min-height: 400px;
            background: #fafafa;
        }

        /* Footer Styles */
        .footer {
            background: #fff;
            border-top: 1px solid #f0f0f0;
            padding: 60px 0 0;
        }

        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .footer-top {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 60px;
            padding-bottom: 50px;
        }

        .footer-brand {
            max-width: 300px;
        }

        .footer-logo {
            width: 120px;
            margin-bottom: 20px;
        }

        .footer-description {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }

        .footer-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: #000;
            margin-bottom: 20px;
        }

        .footer-links {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 12px;
        }

        .footer-links a {
            text-decoration: none;
            color: #666;
            font-size: 14px;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #ff6b9d;
        }

        .social-links {
            display: flex;
            gap: 20px;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #333;
            font-size: 18px;
            transition: all 0.2s;
        }

        .social-icon:hover {
            background: #ff6b9d;
            color: #fff;
        }

        .footer-bottom {
            border-top: 1px solid #f0f0f0;
            padding: 25px 0;
            text-align: center;
        }

        .copyright {
            font-size: 13px;
            color: #666;
        }

        .copyright a {
            color: #ff6b9d;
            text-decoration: none;
        }

        .copyright .heart {
            color: #ff6b6b;
            margin: 0 3px;
        }
    </style>
</head>

<body>
<!-- Header -->
<header class="header">
    <div class="header-container">
        <!-- Logo -->
        <div class="logo">
            <svg class="logo-image" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#ff6b9d" stroke-width="2" />
                <path d="M30 50 Q40 30, 50 50 T70 50" fill="none" stroke="#ff6b9d" stroke-width="2" />
                <circle cx="35" cy="45" r="3" fill="#ff6b9d" />
                <circle cx="65" cy="45" r="3" fill="#ff6b9d" />
            </svg>
            <span class="logo-text">Cosmetic</span>
        </div>

        <!-- Navigation Menu -->
        <nav>
            <ul class="nav-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <!-- Header Actions -->
        <div class="header-actions">
            <!-- Search Icon -->
            <button class="icon-btn">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
            </button>

            <!-- Cart Icon with Badge -->
            <button class="icon-btn">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M9 2a1 1 0 0 0-1 1v1H3a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1h-5V3a1 1 0 0 0-1-1H9z" />
                    <path d="M9 6v2m6-2v2" />
                </svg>
                <span class="badge">1</span>
            </button>

            <!-- Wishlist Icon with Badge -->
            <button class="icon-btn">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                </svg>
                <span class="badge wishlist">0</span>
            </button>

            <!-- User Icon -->
            <button class="icon-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </button>
        </div>
    </div>
</header>

<!-- Main Content Spacer -->
<div class="main-content"></div>

<!-- Footer -->
<footer class="footer">
    <div class="footer-container">
        <div class="footer-top">
            <!-- Brand Section -->
            <div class="footer-brand">
                <svg class="footer-logo" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="30" cy="30" r="25" fill="none" stroke="#ff6b9d" stroke-width="2" />
                    <path d="M15 30 Q22 18, 30 30 T45 30" fill="none" stroke="#ff6b9d" stroke-width="2" />
                    <circle cx="20" cy="26" r="2" fill="#ff6b9d" />
                    <circle cx="40" cy="26" r="2" fill="#ff6b9d" />
                    <text x="65" y="38" font-family="Arial" font-size="18" font-weight="600"
                          fill="#ff6b9d">COSMETIC
                    </text>
                </svg>
                <p class="footer-description">
                    Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been.
                </p>
            </div>

            <!-- Information Links -->
            <div class="footer-section">
                <h3>Thông tin</h3>
                <ul class="footer-links">
                    <li><a href="#">Về chúng tôi</a></li>
                    <li><a href="#">Sản phẩm</a></li>
                </ul>
            </div>

            <!-- Account Links -->
            <div class="footer-section">
                <h3></h3>
                <ul class="footer-links">
                    <li><a href="#">Liên hệ</a></li>
                    <li><a href="#">Tài khoản của tôi</a></li>
                </ul>
            </div>

            <!-- Social Info -->
            <div class="footer-section">
                <h3>Social Info</h3>
                <div class="social-links">
                    <a href="#" class="social-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z" />
                        </svg>
                    </a>
                    <a href="#" class="social-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z" />
                        </svg>
                    </a>
                    <a href="#" class="social-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>

        <!-- Footer Bottom -->
        <div class="footer-bottom">
            <p class="copyright">
                © 2026 Mint Cosmetics. Được làm <span class="heart">♥</span> bởi PhamTra
            </p>
        </div>
    </div>
</footer>
</body>

</html>
