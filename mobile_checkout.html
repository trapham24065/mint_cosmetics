<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #ffffff;
            color: #333;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .checkout-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }

        /* Billing Details Section */
        .billing-section h2 {
            font-size: 18px;
            font-weight: 600;
            color: #000;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 2px solid #000;
            display: inline-block;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 400;
        }

        .form-group label sup {
            color: #e74c3c;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 14px;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #999;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #999;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Order Summary Section */
        .order-section {
            background: #f9f9f9;
            padding: 30px;
            border: 1px solid #e5e5e5;
        }

        .order-section h2 {
            font-size: 18px;
            font-weight: 600;
            color: #000;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 2px solid #000;
            display: inline-block;
        }

        .order-table {
            width: 100%;
            margin-top: 30px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 20px;
        }

        .order-header span {
            font-size: 14px;
            font-weight: 600;
            color: #000;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .order-item-name {
            font-size: 14px;
            color: #333;
        }

        .order-item-qty {
            color: #666;
            font-size: 13px;
        }

        .order-item-price {
            font-size: 14px;
            color: #000;
            font-weight: 500;
        }

        .order-subtotal {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #ddd;
            margin-top: 10px;
        }

        .order-subtotal span:first-child {
            font-size: 14px;
            color: #333;
        }

        .order-subtotal span:last-child {
            font-size: 14px;
            color: #000;
            font-weight: 500;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            padding: 20px 0;
            margin-top: 10px;
        }

        .order-total span:first-child {
            font-size: 16px;
            font-weight: 600;
            color: #000;
        }

        .order-total span:last-child {
            font-size: 18px;
            font-weight: 700;
            color: #000;
        }

        .place-order-btn {
            width: 100%;
            padding: 15px 30px;
            background: #ff6b6b;
            color: #fff;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }

        .place-order-btn:hover {
            background: #ff5252;
        }

        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }
    </style>
</head>

<body>
    <div class="checkout-container">
        <!-- Left Column: Billing Details -->
        <div class="billing-section">
            <h2>Billing Details</h2>

            <div class="form-row">
                <div class="form-group">
                    <label>First name <sup>*</sup></label>
                    <input type="text" />
                </div>
                <div class="form-group">
                    <label>Last name <sup>*</sup></label>
                    <input type="text" />
                </div>
            </div>

            <div class="form-group">
                <label>Street address <sup>*</sup></label>
                <input type="text" />
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Phone <sup>*</sup></label>
                    <input type="tel" />
                </div>
                <div class="form-group">
                    <label>Email address <sup>*</sup></label>
                    <input type="email" />
                </div>
            </div>

            <div class="form-group">
                <label>Order notes (optional)</label>
                <textarea placeholder="Notes about your order..."></textarea>
            </div>
        </div>

        <!-- Right Column: Order Summary -->
        <div class="order-section">
            <h2>Your Order</h2>

            <div class="order-table">
                <div class="order-header">
                    <span>Product</span>
                    <span>Total</span>
                </div>

                <div class="order-item">
                    <div>
                        <div class="order-item-name">csacsc123 <span class="order-item-qty">× 1</span></div>
                    </div>
                    <div class="order-item-price">10.755 VNĐ</div>
                </div>

                <div class="order-subtotal">
                    <span>Subtotal</span>
                    <span>10.755 VNĐ</span>
                </div>

                <div class="order-total">
                    <span>Total</span>
                    <span>10.755 VNĐ</span>
                </div>

                <button class="place-order-btn">PLACE ORDER</button>
            </div>
        </div>
    </div>
</body>

</html>
