<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Quick View Modal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }

        .page-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 40px;
        }

        .modals-container {
            display: flex;
            flex-direction: column;
            gap: 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .modal-section {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .modal-section-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px 30px;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
        }

        .modal-section-title.simple {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        /* Modal Container */
        .modal-container {
            background: #fff;
            width: 100%;
            position: relative;
        }



        /* Modal Content */
        .modal-content {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 40px;
            padding: 40px;
        }

        /* Product Image Section */
        .product-image-section {
            position: relative;
        }

        .product-main-image {
            border: 3px solid #ff9800;
            border-radius: 4px;
            padding: 30px;
            background: #fff;
            text-align: center;
            position: relative;
        }

        .sale-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #f44336;
            color: #fff;
            padding: 6px 14px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 700;
        }

        .brand-logo {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 80px;
        }

        .warranty-badge {
            text-align: center;
            margin: 20px 0;
            font-weight: 700;
            font-size: 16px;
        }

        .product-main-image img {
            max-width: 100%;
            height: auto;
        }

        .product-features {
            margin-top: 20px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: #f5f5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feature-icon svg {
            width: 20px;
            height: 20px;
        }

        .feature-text {
            flex: 1;
        }

        .feature-label {
            font-size: 13px;
            color: #666;
        }

        .feature-value {
            font-weight: 600;
            color: #333;
        }

        /* Product Info Section */
        .product-info-section {
            padding-top: 10px;
        }

        .product-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .stars {
            display: flex;
            gap: 3px;
        }

        .star {
            color: #ffa726;
            font-size: 16px;
        }

        .star.empty {
            color: #e0e0e0;
        }

        .rating-text {
            font-size: 14px;
            color: #666;
        }

        .product-description {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        /* Variant Options */
        .variant-group {
            margin-bottom: 20px;
        }

        .variant-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .variant-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .variant-option {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            background: #fff;
            color: #333;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .variant-option:hover {
            border-color: #ff6b9d;
        }

        .variant-option.selected {
            border-color: #3f51b5;
            background: #3f51b5;
            color: #fff;
        }

        .variant-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Quantity Selector */
        .quantity-group {
            margin-bottom: 20px;
        }

        .quantity-selector {
            display: inline-flex;
            align-items: center;
            border: 2px solid #e91e63;
            border-radius: 25px;
            overflow: hidden;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            background: #fff;
            border: none;
            color: #e91e63;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .qty-btn:hover {
            background: #fce4ec;
        }

        .qty-input {
            width: 60px;
            height: 40px;
            border: none;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
        }

        /* Price Section */
        .price-section {
            margin-bottom: 20px;
        }

        .price-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .price-current {
            font-size: 28px;
            font-weight: 700;
            color: #e91e63;
        }

        .price-original {
            font-size: 16px;
            color: #999;
            text-decoration: line-through;
        }

        .price-placeholder {
            font-size: 16px;
            color: #e91e63;
            font-weight: 600;
        }

        /* Add to Cart Button */
        .add-to-cart-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #ff6b9d 0%, #e91e63 100%);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .add-to-cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 30, 99, 0.4);
        }

        .add-to-cart-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Product Meta */
        .product-meta {
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .meta-item {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .meta-label {
            font-weight: 600;
            color: #333;
        }

        .meta-value {
            color: #666;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .modal-content {
                grid-template-columns: 1fr;
                padding: 20px;
            }

            .product-title {
                font-size: 20px;
            }

            .price-current {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <h1 class="page-title">Quick View Modal - Sản phẩm Biến thể & Đơn giản</h1>

    <div class="modals-container">
        <!-- Variable Product Modal -->
        <div class="modal-section">
            <div class="modal-section-title">Sản phẩm Biến thể (Variable Product)</div>
            <div class="modal-container">
                <div class="modal-content" id="variableProductContent">
                    <!-- Variable product content -->
                </div>
            </div>
        </div>

        <!-- Simple Product Modal -->
        <div class="modal-section">
            <div class="modal-section-title simple">Sản phẩm Đơn giản (Simple Product)</div>
            <div class="modal-container">
                <div class="modal-content" id="simpleProductContent">
                    <!-- Simple product content -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Product Data
        const variableProduct = {
            id: 1,
            name: 'Trà Phạmtest',
            description: 'fbfbfbfb...',
            rating: 0,
            reviewCount: 0,
            image: 'https://via.placeholder.com/300x300/333/00d4ff?text=Mouse',
            brand: 'https://via.placeholder.com/80x40/ff9800/fff?text=LOGO',
            warranty: 'BẢO HÀNH 24 THÁNG',
            features: [
                { icon: 'target', label: 'DPI Max', value: '3600' },
                { icon: 'click', label: '10 triệu lần nhấn', value: '' },
                { icon: 'usb', label: 'Kết nối', value: 'USB 2.0' }
            ],
            type: 'variable',
            attributes: [
                {
                    name: 'Trà Phạm',
                    options: ['S C S C S C S C', 'D W D W D']
                },
                {
                    name: 'efefe',
                    options: ['C S C A C A S C']
                }
            ],
            variations: [
                { attributes: { 'Trà Phạm': 'S C S C S C S C', 'efefe': 'C S C A C A S C' }, price: 34, regularPrice: 14000, sku: 'dedd' }
            ],
            category: 'lips tick'
        };

        const simpleProduct = {
            id: 2,
            name: 'Tẩy Da Chết Mặt Cocoon Cà Phê Đắk Lắk 150ml Dak Lak Coffee Face Polish',
            description: 'Tẩy Da Chết Mặt Cocoon Cà Phê Đắk Lắk 150ml là dòng sản phẩm tẩy tế bào chết da mặt đến từ thương...',
            rating: 0,
            reviewCount: 0,
            image: 'https://via.placeholder.com/300x400/5d4037/fff?text=Cocoon',
            brand: 'https://via.placeholder.com/120x50/4caf50/fff?text=NewFree+2H',
            warranty: null,
            features: [
                { icon: 'leaf', label: 'Tẩy da chết mặt', value: 'Cà phê Đắk Lắk cho làn da mềm mại bằng rỡ' },
                { icon: 'drop', label: 'Dung tích', value: '150ML' }
            ],
            type: 'simple',
            price: 126000,
            regularPrice: 126000,
            sku: 'TAY-DA-CHET-MAT-COCOON-CA-PHE-AK-LAK-150ML-DAK-LAK-COFFEE-FACE-POLISH',
            category: 'Chăm sóc tóc'
        };

        // State
        let selectedVariation = {};
        let quantity = 1;
        let currentProduct = null;

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function () {
            // Render variable product
            currentProduct = variableProduct;
            selectedVariation = {};
            quantity = 1;
            renderModal(variableProduct, 'variableProductContent');

            // Render simple product
            currentProduct = simpleProduct;
            quantity = 1;
            renderModal(simpleProduct, 'simpleProductContent');
        });

        // Render Modal Content
        function renderModal (product, containerId) {
            const modalContent = document.getElementById(containerId);

            const imageSection = `
                <div class="product-image-section">
                    <div class="product-main-image">
                        ${product.warranty ? `<div class="sale-badge">Giảm giá</div>` : ''}
                        ${product.brand ? `<img src="${product.brand}" alt="Brand" class="brand-logo">` : ''}
                        ${product.warranty ? `<div class="warranty-badge">${product.warranty}</div>` : ''}
                        <img src="${product.image}" alt="${product.name}">
                    </div>
                    ${renderFeatures(product.features)}
                </div>
            `;

            const infoSection = `
                <div class="product-info-section">
                    <h1 class="product-title">${product.name}</h1>
                    ${renderRating(product.rating, product.reviewCount)}
                    <div class="product-description">${product.description}</div>
                    ${product.type === 'variable' ? renderVariantOptions(product) : ''}
                    ${renderQuantitySelector()}
                    ${renderPriceSection(product)}
                    ${renderAddToCartButton(product)}
                    ${renderProductMeta(product)}
                </div>
            `;

            modalContent.innerHTML = imageSection + infoSection;
            attachEventListeners(product, containerId);
        }

        // Render Features
        function renderFeatures (features) {
            if (!features || features.length === 0) return '';

            return `
                <div class="product-features">
                    ${features.map(feature => `
                        <div class="feature-item">
                            <div class="feature-icon">
                                ${getFeatureIcon(feature.icon)}
                            </div>
                            <div class="feature-text">
                                ${feature.label ? `<div class="feature-label">${feature.label}</div>` : ''}
                                ${feature.value ? `<div class="feature-value">${feature.value}</div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Get Feature Icon
        function getFeatureIcon (icon) {
            const icons = {
                target: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
                click: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>',
                usb: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5m0 0l-4 4m4-4l4 4M5 12h14"/></svg>',
                leaf: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/></svg>',
                drop: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>'
            };
            return icons[icon] || icons.target;
        }

        // Render Rating
        function renderRating (rating, reviewCount) {
            const stars = [];
            for (let i = 1; i <= 5; i++) {
                stars.push(`<span class="star ${i > rating ? 'empty' : ''}">★</span>`);
            }

            return `
                <div class="product-rating">
                    <div class="stars">${stars.join('')}</div>
                    <span class="rating-text">(${reviewCount} đánh giá)</span>
                </div>
            `;
        }

        // Render Variant Options
        function renderVariantOptions (product) {
            if (!product.attributes) return '';

            return product.attributes.map(attribute => `
                <div class="variant-group">
                    <div class="variant-label">${attribute.name}:</div>
                    <div class="variant-options">
                        ${attribute.options.map(option => `
                            <button class="variant-option"
                                    data-attribute="${attribute.name}"
                                    data-value="${option}">
                                ${option}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Render Quantity Selector
        function renderQuantitySelector () {
            return `
                <div class="quantity-group">
                    <div class="quantity-selector">
                        <button class="qty-btn" onclick="decreaseQuantity()">−</button>
                        <input type="number" class="qty-input" value="${quantity}" min="1" id="quantityInput" readonly>
                        <button class="qty-btn" onclick="increaseQuantity()">+</button>
                    </div>
                </div>
            `;
        }

        // Render Price Section
        function renderPriceSection (product) {
            if (product.type === 'variable') {
                // Check if all attributes are selected
                const allSelected = product.attributes.every(attr =>
                    selectedVariation[attr.name]
                );

                if (allSelected) {
                    // Find matching variation
                    const variation = findMatchingVariation(product);
                    if (variation) {
                        return `
                            <div class="price-section">
                                <div class="price-wrapper">
                                    <span class="price-current">${formatPrice(variation.price)}</span>
                                    ${variation.regularPrice > variation.price ?
                                `<span class="price-original">${formatPrice(variation.regularPrice)}</span>` : ''}
                                </div>
                            </div>
                        `;
                    }
                }

                // Show placeholder when not all options selected
                return `
                    <div class="price-section">
                        <div class="price-placeholder">Chọn các túy chọn để xem giá</div>
                    </div>
                `;
            } else {
                // Simple product - always show price
                return `
                    <div class="price-section">
                        <div class="price-wrapper">
                            <span class="price-current">${formatPrice(product.price)}</span>
                            ${product.regularPrice > product.price ?
                        `<span class="price-original">${formatPrice(product.regularPrice)}</span>` : ''}
                        </div>
                    </div>
                `;
            }
        }

        // Render Add to Cart Button
        function renderAddToCartButton (product) {
            const isDisabled = product.type === 'variable' &&
                !product.attributes.every(attr => selectedVariation[attr.name]);

            return `
                <button class="add-to-cart-btn"
                        ${isDisabled ? 'disabled' : ''}
                        onclick="addToCart()">
                    Thêm vào giỏ hàng
                </button>
            `;
        }

        // Render Product Meta
        function renderProductMeta (product) {
            let sku = 'N/A';

            if (product.type === 'simple') {
                sku = product.sku;
            } else if (product.type === 'variable') {
                const variation = findMatchingVariation(product);
                if (variation) {
                    sku = variation.sku;
                }
            }

            return `
                <div class="product-meta">
                    <div class="meta-item">
                        <span class="meta-label">Mã SKU:</span>
                        <span class="meta-value">${sku}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Danh mục:</span>
                        <span class="meta-value">${product.category}</span>
                    </div>
                </div>
            `;
        }

        // Attach Event Listeners
        function attachEventListeners (product, containerId) {
            if (product.type === 'variable') {
                const container = document.getElementById(containerId);
                const variantButtons = container.querySelectorAll('.variant-option');
                variantButtons.forEach(button => {
                    button.addEventListener('click', function () {
                        const attribute = this.getAttribute('data-attribute');
                        const value = this.getAttribute('data-value');

                        // Remove selected class from siblings
                        const siblings = this.parentElement.querySelectorAll('.variant-option');
                        siblings.forEach(btn => btn.classList.remove('selected'));

                        // Add selected class to clicked button
                        this.classList.add('selected');

                        // Update selected variation
                        selectedVariation[attribute] = value;

                        // Re-render price and button
                        updatePriceAndButton(product, containerId);
                    });
                });
            }
        }

        // Update Price and Button
        function updatePriceAndButton (product, containerId) {
            const container = document.getElementById(containerId);
            const priceSection = container.querySelector('.price-section');
            const addToCartBtn = container.querySelector('.add-to-cart-btn');
            const metaSection = container.querySelector('.product-meta');

            if (priceSection) {
                priceSection.outerHTML = renderPriceSection(product);
            }

            if (addToCartBtn) {
                addToCartBtn.outerHTML = renderAddToCartButton(product);
            }

            if (metaSection) {
                metaSection.outerHTML = renderProductMeta(product);
            }
        }

        // Find Matching Variation
        function findMatchingVariation (product) {
            if (!product.variations) return null;

            return product.variations.find(variation => {
                return Object.keys(variation.attributes).every(key =>
                    variation.attributes[key] === selectedVariation[key]
                );
            });
        }

        // Format Price
        function formatPrice (price) {
            return price.toLocaleString('vi-VN') + 'đ';
        }

        // Quantity Functions
        function increaseQuantity () {
            quantity++;
            document.getElementById('quantityInput').value = quantity;
        }

        function decreaseQuantity () {
            if (quantity > 1) {
                quantity--;
                document.getElementById('quantityInput').value = quantity;
            }
        }

        // Add to Cart
        function addToCart () {
            if (currentProduct.type === 'variable') {
                const variation = findMatchingVariation(currentProduct);
                if (variation) {
                    console.log('Adding to cart:', {
                        product: currentProduct.name,
                        variation: selectedVariation,
                        sku: variation.sku,
                        price: variation.price,
                        quantity: quantity
                    });
                    alert(`Đã thêm ${quantity} sản phẩm vào giỏ hàng!\nSKU: ${variation.sku}\nGiá: ${formatPrice(variation.price)}`);
                }
            } else {
                console.log('Adding to cart:', {
                    product: currentProduct.name,
                    sku: currentProduct.sku,
                    price: currentProduct.price,
                    quantity: quantity
                });
                alert(`Đã thêm ${quantity} sản phẩm vào giỏ hàng!\nSKU: ${currentProduct.sku}\nGiá: ${formatPrice(currentProduct.price)}`);
            }
        }
    </script>
</body>

</html>
