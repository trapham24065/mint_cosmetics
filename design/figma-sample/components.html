<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Components — Mint Cosmetics</title>
    <style>
        :root {
            --brand: #ff6565;
            --accent: #2196F3;
            --muted: #adb5bd;
            --bg: #fff;
            --card: #fff;
            --text: #364958;
            --radius: 10px;
            --gap: 12px;
            --font-ui: 'Figtree', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue'
        }

        body {
            font-family: var(--font-ui);
            margin: 0;
            background: #f7f8fa;
            color: var(--text)
        }

        .wrap {
            max-width: 1100px;
            margin: 28px auto;
            padding: 24px
        }

        h1 {
            margin: 0 0 18px;
            font-size: 22px
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px
        }

        .card {
            background: var(--card);
            padding: 16px;
            border-radius: var(--radius);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04)
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 8px;
            border: 0;
            cursor: pointer;
            font-weight: 600
        }

        .btn.primary {
            background: var(--brand);
            color: #fff
        }

        .btn.secondary {
            background: #fff;
            color: var(--brand);
            border: 1px solid rgba(0, 0, 0, 0.06)
        }

        .btn.ghost {
            background: transparent;
            color: var(--brand);
            border: 1px dashed rgba(0, 0, 0, 0.06)
        }

        .btn.icon {
            padding: 8px;
            border-radius: 999px;
            width: 40px;
            height: 40px;
            justify-content: center
        }

        /* Inputs */
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        input,
        select,
        textarea {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e6e6e6
        }

        /* Navbar */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 8px;
            background: linear-gradient(180deg, #fff, #fbfbfb);
            border: 1px solid #eee
        }

        .nav-links {
            display: flex;
            gap: 10px
        }

        /* Product card */
        .product {
            display: flex;
            gap: 12px;
            align-items: center
        }

        .thumb {
            width: 72px;
            height: 72px;
            background: #f1f3f5;
            border-radius: 8px
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0
        }

        thead th {
            font-weight: 700
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 6px 8px;
            border-radius: 999px;
            background: #f3f4f6;
            font-size: 12px
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>Components — ready for Figma import</h1>

        <section class="card" style="margin-bottom:16px">
            <div class="navbar">
                <div style="display:flex;gap:12px;align-items:center"><img src="logo.svg" width="40" height="40"
                        alt="logo"><strong>Mint Cosmetics</strong></div>
                <div class="nav-links">
                    <a class="badge">Shop</a>
                    <a class="badge">Orders</a>
                    <a class="badge">Support</a>
                </div>
            </div>
        </section>

        <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px">
            <div>
                <section class="card" style="margin-bottom:16px">
                    <h3>Buttons</h3>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
                        <button class="btn primary">Primary</button>
                        <button class="btn secondary">Secondary</button>
                        <button class="btn ghost">Ghost</button>
                        <button class="btn icon">★</button>
                        <button class="btn primary" style="padding:8px 10px;font-size:14px">Small</button>
                    </div>
                </section>

                <section class="card" style="margin-bottom:16px">
                    <h3>Forms</h3>
                    <div style="display:grid;gap:10px">
                        <div class="form-row"><label>Name</label><input placeholder="Nguyễn Văn A"></div>
                        <div class="form-row"><label>Email</label><input placeholder="you@example.com"></div>
                        <div class="form-row"><label>Product</label><select>
                                <option>Rose Serum</option>
                                <option>Mint Cream</option>
                            </select></div>
                        <div class="form-row"><label>Message</label><textarea rows="3"></textarea></div>
                        <div><button class="btn primary">Submit</button></div>
                    </div>
                </section>

                <section class="card">
                    <h3>Table / Data</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Order</th>
                                <th>Customer</th>
                                <th>Status</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>#1234</td>
                                <td>Lan</td>
                                <td><span class="badge">Processing</span></td>
                                <td>$39.00</td>
                            </tr>
                            <tr>
                                <td>#1235</td>
                                <td>Minh</td>
                                <td><span class="badge">Shipped</span></td>
                                <td>$79.00</td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </div>

            <aside>
                <section class="card" style="margin-bottom:16px">
                    <h3>Product card</h3>
                    <div class="product">
                        <div class="thumb"></div>
                        <div style="flex:1">
                            <div style="font-weight:700">Mint Cleanser</div>
                            <div style="color:var(--muted);font-size:13px;margin-top:6px">250ml - Gentle foaming
                                cleanser</div>
                            <div style="margin-top:10px"><button class="btn primary">Add</button></div>
                        </div>
                    </div>
                </section>

                <section class="card">
                    <h3>Status badges</h3>
                    <div style="display:flex;gap:8px;flex-wrap:wrap">
                        <div class="badge">New</div>
                        <div class="badge" style="background:#e6ffed;color:#056937">Success</div>
                        <div class="badge" style="background:#fff4e5;color:#8a4b00">Warning</div>
                        <div class="badge" style="background:#ffecec;color:#8b1d1d">Error</div>
                    </div>
                </section>
            </aside>
        </div>

    </div>
</body>

</html>
